services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitledger
      POSTGRES_PASSWORD: splitledger
      POSTGRES_DB: splitledger
    ports:
      # host 5434: 5432 held by local Homebrew postgres, 5433 by other projects
      - "5434:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # host 6380: 6379 commonly taken by other local projects
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: splitledger
      MINIO_ROOT_PASSWORD: splitledger123
    ports:
      # host 9002/9003: 9000/9001 taken by other local docker containers
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-dev-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata-dev:
  minio-dev-data:
